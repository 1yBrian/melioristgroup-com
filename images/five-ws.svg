<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" width="560" height="560" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <style>
      .center-label { font-size: 22px; font-weight: 600; fill: #faf7f2; }
      .center-sub   { font-size: 11px; font-weight: 400; fill: rgba(250,247,242,0.65); letter-spacing: 0.12em; }
      .w-label      { font-size: 16px; font-weight: 700; fill: #ffffff; letter-spacing: 0.02em; }
      .w-sub        { font-size: 10.5px; font-weight: 400; fill: rgba(255,255,255,0.72); font-family: 'Georgia', serif; font-style: italic; }
      .line         { stroke: rgba(26,61,46,0.2); stroke-width: 1.5; fill: none; }
    </style>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(26,61,46,0.18)"/>
    </filter>
    <filter id="center-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(26,61,46,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="560" fill="#faf7f2" rx="8"/>

  <!-- Pentagon connector lines -->
  <!-- Wisdom(280,62) → Wealth(487,208) → Wonder(411,448) → Wellness(149,448) → Withness(73,208) → back -->
  <polygon points="280,82 468,215 396,432 164,432 92,215"
           fill="none" stroke="rgba(26,61,46,0.12)" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Lines from center to each W node -->
  <line x1="280" y1="280" x2="280" y2="118" class="line" stroke-dasharray="3,3"/>
  <line x1="280" y1="280" x2="444" y2="228" class="line" stroke-dasharray="3,3"/>
  <line x1="280" y1="280" x2="376" y2="416" class="line" stroke-dasharray="3,3"/>
  <line x1="280" y1="280" x2="184" y2="416" class="line" stroke-dasharray="3,3"/>
  <line x1="280" y1="280" x2="116" y2="228" class="line" stroke-dasharray="3,3"/>

  <!-- ── Wisdom (top) ── -->
  <circle cx="280" cy="82" r="64" fill="#457b9d" filter="url(#shadow)"/>
  <!-- Book icon -->
  <g transform="translate(257,55)">
    <rect x="0" y="0" width="22" height="28" rx="2" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <rect x="24" y="0" width="22" height="28" rx="2" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <line x1="22" y1="0" x2="24" y2="0" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <line x1="22" y1="28" x2="24" y2="28" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <line x1="4" y1="8" x2="18" y2="8" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="4" y1="13" x2="18" y2="13" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="28" y1="8" x2="42" y2="8" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  </g>
  <text x="280" y="110" text-anchor="middle" class="w-label">Wisdom</text>
  <text x="280" y="124" text-anchor="middle" class="w-sub">learning · discernment</text>

  <!-- ── Wealth (upper right) ── -->
  <circle cx="444" cy="228" r="64" fill="#b8965a" filter="url(#shadow)"/>
  <!-- Seed/leaf icon (not diamond - stewardship framing) -->
  <g transform="translate(421,200)">
    <ellipse cx="14" cy="14" rx="11" ry="14" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" transform="rotate(-20,14,14)"/>
    <line x1="14" y1="28" x2="14" y2="42" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <path d="M 14 36 Q 20 28 28 28" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <ellipse cx="32" cy="16" rx="8" ry="10" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1" transform="rotate(25,32,16)"/>
  </g>
  <text x="444" y="258" text-anchor="middle" class="w-label">Wealth</text>
  <text x="444" y="272" text-anchor="middle" class="w-sub">creation · stewardship</text>

  <!-- ── Wonder (lower right) ── -->
  <circle cx="376" cy="432" r="64" fill="#e07a5f" filter="url(#shadow)"/>
  <!-- Sparkle / 4-pointed star -->
  <g transform="translate(354,408)">
    <path d="M 22 0 L 25 18 L 44 22 L 25 26 L 22 44 L 19 26 L 0 22 L 19 18 Z"
          fill="rgba(255,255,255,0.75)" stroke="none"/>
    <circle cx="36" cy="8" r="3" fill="rgba(255,255,255,0.5)"/>
    <circle cx="8" cy="36" r="2" fill="rgba(255,255,255,0.4)"/>
  </g>
  <text x="376" y="462" text-anchor="middle" class="w-label">Wonder</text>
  <text x="376" y="476" text-anchor="middle" class="w-sub">joy · creativity · play</text>

  <!-- ── Wellness (lower left) ── -->
  <circle cx="184" cy="432" r="64" fill="#2d6a4f" filter="url(#shadow)"/>
  <!-- Leaf/sprout -->
  <g transform="translate(162,406)">
    <line x1="22" y1="44" x2="22" y2="10" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <ellipse cx="30" cy="22" rx="12" ry="18" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" transform="rotate(20,30,22)"/>
    <ellipse cx="14" cy="28" rx="10" ry="14" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" transform="rotate(-15,14,28)"/>
  </g>
  <text x="184" y="462" text-anchor="middle" class="w-label">Wellness</text>
  <text x="184" y="476" text-anchor="middle" class="w-sub">body · energy · sleep</text>

  <!-- ── With-ness (upper left) ── -->
  <circle cx="116" cy="228" r="64" fill="#7b5ea7" filter="url(#shadow)"/>
  <!-- Two overlapping circles / connection -->
  <g transform="translate(90,200)">
    <circle cx="14" cy="14" r="10" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <circle cx="24" cy="14" r="10" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="19" y1="28" x2="14" y2="42" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="21" y1="28" x2="26" y2="42" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  </g>
  <text x="116" y="258" text-anchor="middle" class="w-label">With-ness</text>
  <text x="116" y="272" text-anchor="middle" class="w-sub">presence · belonging</text>

  <!-- ── Center circle ── -->
  <circle cx="280" cy="280" r="82" fill="#1a3d2e" filter="url(#center-shadow)"/>
  <circle cx="280" cy="280" r="78" fill="none" stroke="rgba(184,150,90,0.35)" stroke-width="1.5"/>
  <text x="280" y="272" text-anchor="middle" class="center-label">Meliorism</text>
  <text x="280" y="291" text-anchor="middle" class="center-label" style="font-size:19px; font-weight:300; fill:#d4af72">2.0</text>
  <text x="280" y="312" text-anchor="middle" class="center-sub">THE FIVE W's</text>

</svg>
