<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The True-Up — Meliorist Group</title>
<style>
  :root{
    --bg:#16161a; --bg-raised:#1e1e24; --bg-card:#25252d;
    --gold:#d4af37; --gold-dim:#9a7f2a; --gold-hi:#f0d585;
    --text:#e8e6e0; --text-dim:#9a988f; --line:#34343d;
    --cold:#5f7e8c; --warm:#c9a44b; --stung:#e07a3f;
    --green:#5b9c6a; --amber:#d2a23e; --red:#cf6048; --red-warn:#c0392b;
    --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);
    line-height:1.6;-webkit-font-smoothing:antialiased;}
  #progress-track{position:fixed;top:0;left:0;right:0;height:3px;background:var(--line);z-index:10;}
  #progress-fill{height:100%;width:0%;background:var(--gold);transition:width .4s ease;}
  #app{max-width:680px;margin:0 auto;padding:34px 26px 20px;height:100vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .panel{opacity:0;transform:translateY(8px);transition:opacity .32s ease,transform .32s ease;}
  .panel.in{opacity:1;transform:translateY(0);}
  @media (prefers-reduced-motion:reduce){.panel{transition:none;transform:none;}#progress-fill{transition:none;}}

  /* header art band */
  .band{margin:0 0 4px;}
  .band svg{display:block;width:100%;height:auto;}

  .speaker{font-family:var(--mono);font-size:11px;letter-spacing:2.5px;
    text-transform:uppercase;margin-bottom:6px;}
  .speaker.mac{color:var(--gold);}
  .speaker.brian{color:var(--gold-dim);}
  .speaker .dot{display:inline-block;width:6px;height:6px;border-radius:50%;
    background:currentColor;margin-right:8px;vertical-align:middle;}
  p.line{margin:0 0 15px;font-size:17px;}
  p.line:last-child{margin-bottom:0;}
  .dim{color:var(--text-dim);}

  .intro-wrap{text-align:center;}
  .intro-wrap h1{font-family:var(--mono);font-size:29px;letter-spacing:5px;
    margin:12px 0 6px;color:var(--gold);font-weight:700;}
  .intro-sub{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;
    text-transform:uppercase;color:var(--text-dim);margin-bottom:16px;}
  .intro-tag{font-size:15.5px;max-width:420px;margin:0 auto 20px;}
  .intro-tag em{display:block;margin-top:9px;font-size:19px;color:var(--gold);font-style:normal;}

  .creed{border-left:2px solid var(--gold-dim);padding:2px 0 2px 18px;margin:0 0 16px;}
  .creed p{margin:0 0 9px;font-size:16.5px;}
  .creed p:last-child{margin-bottom:0;}

  .brian-card{background:var(--bg-card);border:1px solid var(--line);
    border-left:3px solid var(--gold);border-radius:5px;padding:16px 18px;margin:16px 0 20px;}
  .brian-card .speaker{margin-bottom:7px;}
  .brian-card p{margin:0;font-size:15px;color:#dcdad2;}

  .your-turn{font-family:var(--mono);font-size:10px;letter-spacing:2px;
    text-transform:uppercase;color:var(--gold);margin:0 0 8px;}
  textarea,input[type=text]{width:100%;background:var(--bg-raised);border:1px solid var(--line);
    border-radius:5px;color:var(--text);font-family:var(--sans);font-size:16px;
    line-height:1.5;padding:12px 13px;}
  textarea{resize:vertical;min-height:78px;}
  textarea:focus,input[type=text]:focus{outline:none;border-color:var(--gold-dim);}
  textarea::placeholder,input::placeholder{color:#5f5e58;}

  /* mirror — three distinct objects */
  .guess-tag{font-family:var(--mono);font-size:10px;letter-spacing:2px;
    text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;}
  .guess{font-size:22px;line-height:1.42;border:1px solid var(--line);
    background:var(--bg-card);border-radius:6px;padding:22px 20px;margin-bottom:6px;}
  .guess::before{content:"\201C";color:var(--gold-dim);}.guess::after{content:"\201D";color:var(--gold-dim);}
  .mirror-hint{font-size:12.5px;color:var(--text-dim);margin:0 0 16px;}
  .cwm{display:flex;gap:12px;align-items:flex-end;}
  .cwm button{flex:1;font-family:var(--mono);text-transform:uppercase;cursor:pointer;
    background:var(--bg-raised);color:var(--text);border:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;gap:7px;transition:all .15s;}
  .cwm .b-cold{border-radius:5px;padding:11px 6px;font-size:10px;letter-spacing:1.5px;}
  .cwm .b-cold:hover{border-color:var(--cold);color:var(--cold);}
  .cwm .b-warm{border-radius:7px;padding:16px 6px;font-size:11px;letter-spacing:1.5px;}
  .cwm .b-warm:hover{border-color:var(--warm);color:var(--warm);}
  .cwm .b-stung{border-radius:9px;padding:22px 6px;font-size:12.5px;letter-spacing:1.5px;
    border-width:1.5px;}
  .cwm .b-stung:hover{border-color:var(--stung);color:var(--stung);background:#2c211b;}
  .cwm .ic{font-size:17px;}

  /* gauges */
  .gauge{margin:0 0 10px;}
  .gauge:last-child{margin-bottom:4px;}
  .g-ask{font-size:15px;margin-bottom:4px;}
  .g-name{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;
    color:var(--gold);margin-bottom:2px;}
  .g-val{font-family:var(--mono);font-size:26px;color:var(--gold);}
  .g-anchor{font-size:13px;color:var(--text-dim);min-height:0;margin-top:2px;}
  /* horizontal slider — dynamic color track */
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:10px;
    border-radius:5px;outline:none;cursor:pointer;
    background:linear-gradient(90deg,var(--track-color,#4a9a6a) var(--track-pct,50%),#2a2a30 var(--track-pct,50%));}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;
    border-radius:50%;background:var(--gold-hi);border:3px solid var(--bg);cursor:pointer;
    box-shadow:0 0 0 1px var(--gold),0 2px 8px rgba(0,0,0,0.4);}
  input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;
    background:var(--gold-hi);border:3px solid var(--bg);cursor:pointer;}
  /* identity variant — square thumb, stepped track */
  input.geared::-webkit-slider-thumb{border-radius:4px;}
  input.geared::-moz-range-thumb{border-radius:4px;}
  .gauge-readout{display:flex;align-items:baseline;gap:16px;margin-top:4px;}
  .gauge-readout .g-val{font-family:var(--mono);font-size:22px;color:var(--gold);min-width:34px;}
  .gauge-readout .g-anchor{font-size:12px;color:var(--text-dim);font-style:italic;}
  /* vertical tube */
  .tube-wrap{display:flex;align-items:center;gap:14px;}
  .tube{position:relative;width:44px;height:80px;border:2px solid var(--line);
    border-radius:8px;background:var(--bg-raised);overflow:hidden;cursor:pointer;}
  .tube-fill{position:absolute;left:0;right:0;bottom:0;
    background:linear-gradient(0deg,var(--gold-dim),var(--gold-hi));transition:height .12s;}
  .tube-scale{font-family:var(--mono);font-size:9px;color:var(--text-dim);
    display:flex;flex-direction:column;justify-content:space-between;height:80px;}
  /* rotary dial */
  .dial-wrap{display:flex;align-items:center;gap:20px;}
  .dial{width:90px;height:90px;cursor:pointer;flex-shrink:0;}

  /* day-dial quadrants */
  .quad{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-width:330px;}
  .quad button{padding:20px 10px;border:1px solid var(--line);border-radius:5px;
    background:var(--bg-raised);color:var(--text);font-family:var(--sans);
    font-size:14px;cursor:pointer;text-transform:none;letter-spacing:0;line-height:1.3;}
  .quad button:hover{border-color:var(--gold);color:var(--gold);}
  .quad button.sel{border-color:var(--gold);color:var(--gold);background:var(--bg-card);}
  .quad .qd{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--text-dim);
    text-transform:uppercase;display:block;margin-top:3px;}

  /* choices */
  .opt-col{display:flex;flex-direction:column;gap:8px;}
  .opt-col button{text-align:left;text-transform:none;letter-spacing:.2px;
    font-family:var(--sans);font-size:15px;padding:13px 15px;}
  .opt-row{display:flex;gap:8px;flex-wrap:wrap;}
  .opt-row button{flex:1;min-width:120px;text-transform:none;font-family:var(--sans);font-size:14px;}

  button{font-family:var(--mono);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
    cursor:pointer;background:transparent;color:var(--text);border:1px solid var(--line);
    border-radius:5px;padding:13px 20px;transition:all .15s ease;}
  button:hover{border-color:var(--gold);color:var(--gold);}
  button:focus-visible{outline:2px solid var(--gold-dim);outline-offset:2px;}
  button.primary{border-color:var(--gold-dim);color:var(--gold);}
  button.primary:hover{background:var(--gold);color:var(--bg);}
  button.sel{background:var(--bg-card);border-color:var(--gold);color:var(--gold);}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:24px;}
  .nav .spacer{flex:1;}
  button.back{border:none;color:var(--text-dim);padding:13px 6px;}
  button.back:hover{color:var(--gold);}

  .block{margin:0 0 22px;}
  .block:last-of-type{margin-bottom:6px;}
  .reflect-card{background:var(--bg-card);border:1px solid var(--line);
    border-left:3px solid var(--warm);border-radius:5px;padding:15px 17px;margin:16px 0;}
  .reflect-card .speaker{margin-bottom:7px;}
  .reflect-card p{margin:0;font-size:15px;font-style:italic;color:#e2ddcf;}

  .readout-h{font-family:var(--mono);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--gold);margin:22px 0 10px;}
  .gauge-row{display:flex;gap:7px;margin:12px 0;}
  .gchip{flex:1;background:var(--bg-card);border:1px solid var(--line);border-radius:5px;
    padding:11px 6px;text-align:center;}
  .gchip .gn{font-family:var(--mono);font-size:8.5px;letter-spacing:.5px;
    text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;}
  .gchip .gb{font-family:var(--mono);font-size:11px;font-weight:700;}
  .band-GREEN{color:var(--green);}.band-AMBER{color:var(--amber);}.band-RED{color:var(--red);}
  .move-box{background:var(--bg-card);border:1px solid var(--line);border-left:3px solid var(--gold);
    border-radius:5px;padding:14px 16px;margin:11px 0;}
  .move-box .ml{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;
    color:var(--gold);margin-bottom:5px;}
  .move-box p{margin:0;font-size:15px;}

  .consent{display:flex;gap:11px;align-items:flex-start;background:var(--bg-raised);
    border:1px solid var(--line);border-radius:6px;padding:13px 15px;margin:9px 0;cursor:pointer;}
  .consent .box{flex-shrink:0;width:22px;height:22px;border:1px solid var(--gold-dim);
    border-radius:4px;margin-top:1px;display:flex;align-items:center;justify-content:center;
    color:var(--bg);font-size:14px;font-weight:700;font-family:var(--mono);}
  .consent.on .box{background:var(--gold);}
  .consent .ct{font-size:14px;line-height:1.45;}
  .privacy{font-size:12px;color:var(--text-dim);line-height:1.55;border-top:1px solid var(--line);
    margin-top:16px;padding-top:13px;}
  .field-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;
    color:var(--gold);margin:16px 0 7px;}
  .end-mark{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:3px;
    color:var(--text-dim);text-transform:uppercase;margin-top:30px;}
  .homelink{text-align:center;margin-top:16px;}
  .homelink a{color:var(--gold-dim);font-family:var(--mono);font-size:11px;letter-spacing:2px;
    text-transform:uppercase;text-decoration:none;}
  .homelink a:hover{color:var(--gold);}
  .mirrors-list{display:flex;flex-direction:column;gap:18px;margin:16px 0;}
  .mirror-item .guess{font-family:'Crimson Text',Georgia,serif;font-size:1.15rem;
    color:var(--text-dim);font-style:italic;margin-bottom:10px;line-height:1.4;}
  .mirror-item .cwm{display:flex;gap:8px;}
  .trade2-block{margin:0 0 20px;border-top:1px solid var(--line);padding-top:18px;}
  .trade2-block:first-of-type{border-top:none;padding-top:0;}
  .band-spacer{height:16px;}
</style>
</head>
<body>
<div id="progress-track"><div id="progress-fill"></div></div>
<div id="app"></div>

<script>
"use strict";
var state={answers:{},mirror:{},gauges:{},choices:{},consent:{},reflected:{},macReflections:{},pageReflected:{}};
var current=0;

/* ================= SVG ART ================= */
function macMark(sz){ sz=sz||66; return '<svg viewBox="0 0 100 100" width="'+sz+'" height="'+sz+'" xmlns="http://www.w3.org/2000/svg">'+
  '<circle cx="50" cy="50" r="46" fill="#1e1e24" stroke="#9a7f2a" stroke-width="1.4"/>'+
  '<circle cx="50" cy="50" r="38" fill="none" stroke="#34343d" stroke-width="1"/>'+
  '<g stroke="#d4af37" stroke-width="3.2" stroke-linecap="round" fill="none">'+
  '<path d="M38 62 L60 40"/><circle cx="35" cy="65" r="7"/><circle cx="63" cy="37" r="7"/></g>'+
  '<circle cx="50" cy="50" r="2.6" fill="#f0d585"/>'+
  '<g stroke="#9a7f2a" stroke-width="1">'+
  '<line x1="50" y1="8" x2="50" y2="14"/><line x1="50" y1="86" x2="50" y2="92"/>'+
  '<line x1="8" y1="50" x2="14" y2="50"/><line x1="86" y1="50" x2="92" y2="50"/></g></svg>'; }

function band(station){
  var ticks='';
  for(var i=0;i<34;i++){var x=70+i*16;ticks+='<line x1="'+x+'" y1="56" x2="'+x+'" y2="'+(i%5===0?48:52)+'" stroke="#564726" stroke-width="1"/>';}
  return '<div class="band"><svg viewBox="0 0 600 78" xmlns="http://www.w3.org/2000/svg">'+
    '<rect x="1" y="1" width="598" height="76" fill="none" stroke="#34343d" stroke-width="1"/>'+
    macMarkInline(46,30,15)+
    '<text x="300" y="34" text-anchor="middle" fill="#d4af37" font-family="'+"'Courier New',monospace"+'" '+
      'font-size="15" letter-spacing="3">'+(station||'THE TRUE-UP')+'</text>'+
    ticks+
    '<text x="565" y="34" text-anchor="end" fill="#564726" font-family="'+"'Courier New',monospace"+'" font-size="9" letter-spacing="1">SIGNAL-OS</text>'+
    '</svg></div>'; }
function macMarkInline(sz,cx,cy){
  return '<g transform="translate('+(cx-sz/2)+','+(cy-sz/2)+') scale('+(sz/100)+')">'+
    '<circle cx="50" cy="50" r="46" fill="#1e1e24" stroke="#9a7f2a" stroke-width="1.6"/>'+
    '<g stroke="#d4af37" stroke-width="4" stroke-linecap="round" fill="none">'+
    '<path d="M38 62 L60 40"/><circle cx="35" cy="65" r="8"/><circle cx="63" cy="37" r="8"/></g>'+
    '<circle cx="50" cy="50" r="3" fill="#f0d585"/></g>'; }
function heroArt(){
  var t='';for(var i=0;i<60;i++){var a=i/60*2*Math.PI;t+='<line x1="'+(150+Math.cos(a)*86).toFixed(1)+'" y1="'+(150+Math.sin(a)*86).toFixed(1)+
    '" x2="'+(150+Math.cos(a)*(i%5===0?72:80)).toFixed(1)+'" y2="'+(150+Math.sin(a)*(i%5===0?72:80)).toFixed(1)+
    '" stroke="#9a7f2a" stroke-width="'+(i%5===0?1.4:0.7)+'"/>';}
  return '<svg viewBox="0 0 300 300" width="104" height="104" xmlns="http://www.w3.org/2000/svg">'+
    '<circle cx="150" cy="150" r="98" fill="none" stroke="#34343d" stroke-width="1"/>'+t+
    '<circle cx="150" cy="150" r="58" fill="none" stroke="#9a7f2a" stroke-width="1"/>'+
    '<circle cx="150" cy="150" r="40" fill="none" stroke="#564726" stroke-width="1"/>'+
    '<line x1="150" y1="150" x2="150" y2="68" stroke="#f0d585" stroke-width="3" stroke-linecap="round"/>'+
    '<circle cx="150" cy="150" r="7" fill="#1e1e24" stroke="#d4af37" stroke-width="2"/>'+
    '<circle cx="150" cy="150" r="2.5" fill="#f0d585"/></svg>'; }

/* ================= CONTENT ================= */
var P=[
 {kind:"intro"},

 /* ROLL-IN -- Brian intro folded into Mac\'s opener */
 {kind:"voice",sp:"brian",nm:"Brian Oney",st:"",creed:[
   "I believe you have intrinsic worth.",
   "I believe you have hidden value worthy of being discovered.",
   "I\'ve watched society, circumstances, and structures diminish and distract people from thriving -- in life, business, joy, relationships, wisdom, wellness, and wonder."],
   body:["What I want is to discover, with others, how we overcome that resistance -- and reveal our best selves.",
         "Hi -- I\'m Brian Oney. San Francisco. A dad. I consult with business owners, lead trainings, design presentations.",
         "The person taking you through this is Mac. She runs the floor. I think; she wrenches. Listen to her."]},

 /* Mac\'s roll-in + first 3 mirrors on one page */
 {kind:"mirrors",st:"ROLL-IN",
   mac_intro:["Pull it in, kill the engine, pop the hood. I\'m Mac -- I run this floor.",
     "The deal: I won\'t tell you what\'s wrong with you. I\'ll tell you what I see, and you tell me where I\'m off.",
     "First I\'ll take some guesses. Notice which wrong one makes you flinch."],
   guesses:[
     {n:1,guess:"Your real problem is just that you\'ve got too much on your plate."},
     {n:2,guess:"You\'d be fine if you just had more discipline."},
     {n:3,guess:"The thing draining you is something you secretly enjoy."}
   ]},
 {kind:"mirrors",st:"ROLL-IN",
   guesses:[
     {n:4,guess:"You already know exactly what to cut. You just haven\'t."},
     {n:5,guess:"Your sharpest hours are going to other people\'s priorities."}
   ]},
 {kind:"debrief",sp:"mac",nm:"Mac",st:"ROLL-IN"},

 /* LOGBOOK -- two trade pairs, each on one page */
 {kind:"trades2",st:"THE LOGBOOK",
   mac_intro:["Every machine has a logbook -- where it\'s been, what it was built for. Short answers are real answers."],
   items:[
     {key:"t1",ask:"The short version -- how\'d you get here?",
       brian:"UC Santa Cruz, then a Master of Public Administration at Syracuse. I spent a career in rooms where smart people couldn\'t see what they already had. That became the practice.",
       ph:"How you got here."},
     {key:"education",ask:"Where did you actually learn what you\'re good at?",
       brian:"A decade in hospitality. Rolling silverware, difficult clients, leading BEO meetings. I also learned to squat down and meet a kid eye to eye. That decade taught me to read a person better than any degree.",
       ph:"Where you really learned it."}
   ]},
 {kind:"inputs",st:"THE LOGBOOK",items:[
   {type:"prompt",key:"interests",ask:"What pulls your attention when nobody\'s paying you to care?",ph:"For free."},
   {type:"prompt",key:"hobbies",ask:"What do you do with your hands or time that has nothing to do with money?",ph:"What doesn\'t pay."}]},
 {kind:"trades2",st:"THE LOGBOOK",
   mac_intro:["Quick one about Brian: he got advanced-certified on scuba. All the way, or not at the door."],
   items:[
     {key:"t2",ask:"Name something you made sure you did -- on purpose.",
       brian:"Advanced scuba. One skydive. One bungee off a canyon in New Zealand. Most of a year traveling the world. Proof I\'d act when it counted.",
       ph:"Something you made sure you did."},
     {key:"t3",ask:"What are you most grateful for? Don\'t polish it.",
       brian:"I just watched my daughter graduate from college. Of everything -- that\'s what came up first.",
       ph:"What you\'re grateful for."}
   ]},

 /* DENTS -- dent + reframe on one page */
 {kind:"inputs",st:"THE DENTS",
   mac_intro:["Every machine worth anything has dents. You decide how much to say -- pointing at it is enough."],
   items:[
     {type:"prompt",key:"dent",ask:"Name a dent. Something that hit hard.",ph:"A dent. As much or little as you want."},
     {type:"prompt",key:"reframe",ask:"What did that dent leave you able to do that you couldn\'t before? (Mac calls this liquid sunshine -- it doesn\'t deny the rain, it names what the rain watered.)",ph:"What the dent left you able to do."}
   ]},
 {kind:"trades2",st:"THE DENTS",
   mac_intro:["Brian jumped out of a plane once, threw himself off a New Zealand canyon once. He was after knowing he\'d do it, not a hobby."],
   items:[
     {key:"t4",ask:"A dent of Brian\'s, since he asked for one of yours.",
       brian:"At seventeen I stopped seeing the point of homework -- into questioning whether my existence had value. Depressed, lonely. Then a high school let me co-design my own curriculum, and it handed my agency back. People are rarely broken -- usually just blocked.",
       ph:"Anything that surfaced -- optional."},
     {key:"t5",ask:"If you had one year left, what would you change about how you\'re living?",
       brian:"More time with my kids. Travel, actually relax. Pull the messages worth sharing out of my soul. Take the brakes off love.",
       ph:"What you\'d change with a year left."}
   ]},

 /* WARNING LIGHTS */
 {kind:"voice",sp:"mac",nm:"Mac",st:"WARNING LIGHTS",body:[
   "Now the gauges. Three at once. Higher always means more wear. Be honest about the redline.",
   "Brian note: he runs an ADHD engine and isn\'t quiet about it. Half of why this shop is short and clutter-free is that he built it for the brain he\'s actually got."]},
 {kind:"gauges",st:"WARNING LIGHTS",items:[
   {key:"load",tool:"slider",name:"Load Limit",ask:"How close to your sustainable redline are you running?",
     anchors:[[20,"Coasting. Real margin."],[50,"Working. Sustainable."],[75,"Loaded -- weeks, not quarters."],[95,"Redline. Heat building."],[100,"Seized."]]},
   {key:"drag",tool:"tube",name:"Drag Factor",ask:"How much of your effort goes to things you do because you 'should'?",
     anchors:[[20,"Clean line."],[50,"Normal drag."],[75,"Heavy -- the Spark is starving."],[100,"Towing a wall."]]},

/* ================= HELPERS ================= */
function esc(s){return (s||"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return esc(s).replace(/"/g,'&quot;');}
function spk(sp,nm){var w=sp==="brian"?"brian":"mac";
  return '<div class="speaker '+w+'"><span class="dot"></span>'+(nm||"").toUpperCase()+'</div>';}
function lns(a){return a.map(function(t){return '<p class="line">'+t+'</p>';}).join('');}
function anchorFor(anchors,v){var t=anchors[anchors.length-1][1];
  for(var i=0;i<anchors.length;i++){if(v<=anchors[i][0]){t=anchors[i][1];break;}}return t;}

/* ================= SCORING ================= */
function loadWear(){var v=state.gauges.load||0,d=state.choices.loadDuration;
  if(v>=60&&d==="Weeks")v=Math.min(100,v+15);
  else if(v>=60&&(d==="Months"||d==="Can\'t remember"))v=Math.min(100,v+25);return v;}
function gaugeWear(){return{"Load Limit":loadWear(),"Drag Factor":state.gauges.drag||0,
  "Identity Friction":state.gauges.identity||0,"Rhythm Dial":state.gauges.rhythm||0};}
function bandOf(w){return w<=39?"GREEN":(w<=69?"AMBER":"RED");}
function readoutData(){var g=gaugeWear(),pr=["Load Limit","Drag Factor","Identity Friction","Rhythm Dial"];
  var b=pr[0];pr.forEach(function(k){if(g[k]>g[b])b=k;});
  var red=0;pr.forEach(function(k){if(g[k]>=70)red++;});
  return{g:g,binding:b,red:red,bands:{"Load Limit":bandOf(g["Load Limit"]),"Drag Factor":bandOf(g["Drag Factor"]),
    "Identity Friction":bandOf(g["Identity Friction"]),"Rhythm Dial":bandOf(g["Rhythm Dial"])}};}
var REBOARD={"Load Limit":"The Horizontal Hour -- one hour, flat, no input, daily. A load-shed, not a nap.",
  "Drag Factor":"The One No -- decline one thing this week. Out loud. Don\'t soften it into a delegation.",
  "Identity Friction":"The Retirement Letter -- thank the old identity in writing, then retire it on paper.",
  "Rhythm Dial":"The Rising-Sun Block -- protect your two sharpest hours. Hardest work goes there, nothing else."};
var CLINE={"Load Limit":"You\'re running hottest on capacity. Nothing else gets fixed while the tank\'s this low.",
  "Drag Factor":"Your heaviest wear is drag -- effort burning on what was never yours to carry.",
  "Identity Friction":"The friction is identity -- you\'re paying to keep proving someone you\'ve outgrown.",

function gaugeHtml(g){
  var v=state.gauges[g.key];if(v===undefined)v=50;
  var tool="";
  if(g.tool==="slider"||g.tool==="geared"){
    tool='<input type="range" min="0" max="100" value="'+v+'" data-gkey="'+g.key+'"'+
      (g.tool==="geared"?' class="geared"':'')+'>';
  } else if(g.tool==="tube"){
    tool='<div class="tube-wrap"><div class="tube" data-tube="'+g.key+'">'+
      '<div class="tube-fill" style="height:'+v+'%;"></div></div>'+
      '<div class="tube-scale"><span>100</span><span>50</span><span>0</span></div></div>';
  } else if(g.tool==="dial"){
    tool='<div class="dial-wrap"><svg class="dial" viewBox="0 0 200 200" data-dial="'+g.key+'">'+
      dialSvg(v)+'</svg><div><div class="g-val" id="gv-'+g.key+'">'+v+'</div>'+
      '<div class="g-anchor" id="ga-'+g.key+'"></div></div></div>';
  }
  var head='<div class="g-name">'+g.name+'</div><p class="g-ask">'+g.ask+'</p>';
  if(g.tool==="dial") return '<div class="gauge" data-gauge="'+g.key+'">'+head+tool+'</div>';
  return '<div class="gauge" data-gauge="'+g.key+'">'+head+tool+
    '<div class="gauge-readout">'+
    '<span class="g-val" id="gv-'+g.key+'">'+v+'</span>'+
    '<span class="g-anchor" id="ga-'+g.key+'">'+anchorFor(g.anchors,v)+'</span>'+
    '</div></div>';
}
function dialSvg(v){
  var a0=135,a1=405,ang=a0+(a1-a0)*v/100;
  var ticks="";
  for(var i=0;i<=10;i++){var t=(a0+(a1-a0)*i/10)*Math.PI/180;
    ticks+='<line x1="'+(100+Math.cos(t)*72).toFixed(1)+'" y1="'+(100+Math.sin(t)*72).toFixed(1)+
      '" x2="'+(100+Math.cos(t)*(i%5===0?60:66)).toFixed(1)+'" y2="'+(100+Math.sin(t)*(i%5===0?60:66)).toFixed(1)+
      '" stroke="#9a7f2a" stroke-width="'+(i%5===0?2:1)+'"/>';}
  var r=ang*Math.PI/180;
  return '<circle cx="100" cy="100" r="82" fill="#1e1e24" stroke="#34343d" stroke-width="1.5"/>'+
    '<circle cx="100" cy="100" r="74" fill="none" stroke="#564726" stroke-width="1"/>'+ticks+
    '<line x1="100" y1="100" x2="'+(100+Math.cos(r)*58).toFixed(1)+'" y2="'+(100+Math.sin(r)*58).toFixed(1)+
    '" stroke="#f0d585" stroke-width="4" stroke-linecap="round"/>'+
    '<circle cx="100" cy="100" r="9" fill="#25252d" stroke="#d4af37" stroke-width="2"/>'+
    '<circle cx="100" cy="100" r="3" fill="#f0d585"/>';
}
function initGauge(g){
  var key=g.key;
  function setVal(v){v=Math.max(0,Math.min(100,Math.round(v)));state.gauges[key]=v;
    var gv=document.getElementById("gv-"+key),ga=document.getElementById("ga-"+key);
    if(gv)gv.textContent=v;if(ga)ga.textContent=anchorFor(g.anchors,v);
    if(g.tool==="slider"||g.tool==="geared"){
      var inp=document.querySelector('[data-gkey="'+key+'"]');
      if(inp){
        var color=v<=39?'#4a9a6a':v<=69?'#d4a017':'#c0392b';
        inp.style.setProperty('--track-color',color);
        inp.style.setProperty('--track-pct',v+'%');
      }
    }
    if(g.tool==="tube"){var f=document.querySelector('[data-tube="'+key+'"] .tube-fill');if(f)f.style.height=v+"%";}
    if(g.tool==="dial"){var d=document.querySelector('[data-dial="'+key+'"]');if(d)d.innerHTML=dialSvg(v);}
  }
  if(state.gauges[key]===undefined)state.gauges[key]=50;
  setVal(state.gauges[key]);
  if(g.tool==="slider"||g.tool==="geared"){
    var r=document.querySelector('[data-gkey="'+key+'"]');
    if(r)r.addEventListener("input",function(){setVal(parseInt(r.value,10));});
  } else if(g.tool==="tube"){
    var tb=document.querySelector('[data-tube="'+key+'"]');
    if(tb)tb.addEventListener("click",function(e){var b=tb.getBoundingClientRect();
      setVal((1-(e.clientY-b.top)/b.height)*100);});
  } else if(g.tool==="dial"){
    var dl=document.querySelector('[data-dial="'+key+'"]');
    if(dl)dl.addEventListener("click",function(e){var b=dl.getBoundingClientRect();
      var x=(e.clientX-b.left)/b.width*200-100,y=(e.clientY-b.top)/b.height*200-100;
      var deg=Math.atan2(y,x)*180/Math.PI;if(deg<0)deg+=360;
      var rel=deg-135;if(rel<0)rel+=360;if(rel>270)rel=(rel>315?0:270);
      setVal(rel/270*100);});
  }
}

function debrief(){var v=[1,2,3,4,5].map(function(n){return state.mirror[n];});
  var s=v.filter(function(x){return x==="stung";}).length,w=v.filter(function(x){return x==="warm";}).length;
  if(s>0)return["Good. "+s+" of those stung.","I won\'t do anything clever with that yet -- I just want you to know I caught it. Noticing the sting is the whole skill."];
  if(w>0)return["Nothing drew blood, but a few were in the neighborhood. The hood\'s open now."];
  return["Nothing landed. Either I\'m rusty, or you rolled in armored up. No judgment -- we\'ll keep the readings honest."];}
function gtrap(){var g=gaugeWear(),vals=[g["Load Limit"],g["Drag Factor"],g["Identity Friction"],g["Rhythm Dial"]];
  if(vals.every(function(w){return w<=39;}))return["All four reading clean -- rare, and worth protecting. Or one gauge is stuck. Sit with that a second, then we\'ll move."];
  if(Math.max.apply(null,vals)-Math.min.apply(null,vals)<=10)return["Those four came in nearly identical. They measure different things -- worth a glance back if one feels off."];
  return["Gauges read honest. Let\'s keep going."];}
function endLines(){var l=["That\'s the True-Up. I\'ve got a real picture of the machine now.",
  "You weren\'t tested. You were read -- and most of what showed up was already there."];
  if(state.consent.copy)l.push("You asked for your responses -- they\'ll reach you the way you said. Re-run this whenever something feels off.");
  if(state.consent.brian)l.push("And Brian may reach out -- because something you said was worth a real conversation.");
  l.push("Take care of the machine. It\'s the only one you\'ve got.");return l;}

function readoutHtml(){
  var r=readoutData(),names=["Load Limit","Drag Factor","Identity Friction","Rhythm Dial"];
  var chips=names.map(function(k){return '<div class="gchip"><div class="gn">'+k+'</div>'+
    '<div class="gb band-'+r.bands[k]+'">'+r.bands[k]+'</div></div>';}).join('');
  var pr=["Running clean.","One constraint.","Strained -- two in the red.","Overload -- triage.","Overload -- triage."][r.red];
  var sub=(state.answers.shoulds||"").trim();
  var subtraction=(r.binding==="Drag Factor"&&sub)
    ?'From the shoulds you named -- take the heaviest one, "'+esc(sub.split(/[\n,;]/)[0].trim())+'," and drag it to the bench. Subtract it this week.'
    :'Find the single heaviest thing on the binding gauge. One thing. Drag it to the bench this week.';
  return '<div class="readout-h">The Readout -- your shop ticket</div>'+
    '<p class="line" style="font-size:15px;">'+picture(r)+'</p>'+
    '<div class="gauge-row">'+chips+'</div>'+
    '<p class="line dim" style="font-size:12.5px;">System pressure: '+pr+'</p>'+
    '<div class="move-box"><div class="ml">The binding constraint</div><p>'+CLINE[r.binding]+'</p></div>'+
    '<div class="move-box"><div class="ml">One subtraction</div><p>'+subtraction+'</p></div>'+
    '<div class="move-box"><div class="ml">One re-board</div><p>'+REBOARD[r.binding]+'</p></div>';
}
function picture(r){
  var s="Here\'s what I see. ";
  if(r.red===0)s+="You\'re running clean across all four gauges -- rare, and worth protecting. ";
  else if(r.red>=3)s+="You\'re carrying real load -- three or more gauges in the red. This is triage, not a tune-up. ";
  else s+="Most of the machine is sound, with the wear concentrated in one place. ";
  s+=CLINE[r.binding]+" ";
  var t=state.gauges.timeWealth||0,p=state.gauges.powerWealth||0;
  if(Math.abs(t-p)>=35)s+=(t<p?"And the wealth tanks don\'t match -- money fuller than time. ":"Your time runs fuller than your leverage. ");
  var bc=(state.answers.becoming||"").trim();
  if(bc)s+="You\'re becoming \""+esc(bc)+"\" -- that\'s the direction every subtraction should serve. ";
  if((state.answers.t3||"").trim())s+="And you named gratitude without polishing it. People who still can are rarely as stuck as they feel.";
  return s.trim();
}

function contactHtml(){
  var m=state.choices.contactMethod,methods=["Email","Text","LinkedIn DM","Instagram DM"];
  return spk("mac","Mac")+
    '<p class="line">One last thing. If you want anything to come of this -- your own copy, or a word from Brian -- I need a way to reach you.</p>'+
    '<div class="field-label">Best way to reach you</div><div class="opt-row">'+
    methods.map(function(o){return '<button class="'+(m===o?"sel":"")+'" data-cm="'+escA(o)+'">'+o+'</button>';}).join('')+'</div>'+
    '<div class="field-label">The handle / address</div>'+
    '<input type="text" id="cVal" placeholder="Where that reaches you" value="'+escA(state.answers.contactVal||"")+'">'+
    '<div class="field-label">Your name</div>'+
    '<input type="text" id="cName" placeholder="What Brian should call you" value="'+escA(state.answers.contactName||"")+'">'+
    '<div class="consent'+(state.consent.copy?" on":"")+'" data-consent="copy"><div class="box">'+(state.consent.copy?"✓":"")+
      '</div><div class="ct">Send me my own responses. I\'d like to keep what I put down.</div></div>'+
    '<div class="consent'+(state.consent.brian?" on":"")+'" data-consent="brian"><div class="box">'+(state.consent.brian?"✓":"")+
      '</div><div class="ct">I\'m OK if Brian wants to respond. Leave this unchecked and he won\'t.</div></div>'+
    '<p class="privacy">Your answers go to Brian Oney at Meliorist Group, and nowhere else -- not sold, not shared, not used to train anything. Both boxes are yours to leave unchecked; the True-Up still works either way. The Dents and the Engine Room hold tender things -- you decide who sees them.</p>'+
    '<div class="nav"><button class="back" data-act="back">← Back</button><div class="spacer"></div>'+
    '<button class="primary" data-act="submit">Finish &amp; send</button></div>';
}

/* ================= NAV + BIND ================= */
function nextIdx(f){var i=f+1;while(i<P.length){var s=P[i];
  if(s.skipKey&&state.choices[s.skipKey]===s.skipVal){i++;continue;}break;}return i;}
function prevIdx(f){var i=f-1;while(i>0){var s=P[i];
  if(s.skipKey&&state.choices[s.skipKey]===s.skipVal){i--;continue;}break;}return i;}
function go(n){if(n<0||n>=P.length)return;current=n;render();}

function saveStep(){
  var p=P[current];
  if(p.kind==="trade"||p.kind==="prompt"){
    var ta=document.getElementById("ta");if(ta)state.answers[p.key]=ta.value;
  } else if(p.kind==="inputs"){
    document.querySelectorAll("#app textarea[data-key]").forEach(function(t){
      state.answers[t.getAttribute("data-key")]=t.value;});
  } else if(p.kind==="trades2"){
    document.querySelectorAll("#app textarea[data-t2key]").forEach(function(t){
      state.answers[t.getAttribute("data-t2key")]=t.value;});
  } else if(p.kind==="engineroom"){
    document.querySelectorAll("#app textarea[data-key]").forEach(function(t){
      state.answers[t.getAttribute("data-key")]=t.value;});
  } else if(p.kind==="contact"){
    var cv=document.getElementById("cVal"),cn=document.getElementById("cName");
    if(cv)state.answers.contactVal=cv.value;if(cn)state.answers.contactName=cn.value;
  }
}
function macReflectCall(q,a,st,cbKey){
  fetch("/api/mac-reflect",{method:"POST",headers:{"content-type":"application/json"},
    body:JSON.stringify({question:q,answer:a,station:st||""})
  }).then(function(r){return r.json();})
    .then(function(d){state.macReflections=state.macReflections||{};
      state.macReflections[cbKey]=d.reflection||"Good. Keep going.";
      if(cbKey.indexOf("page_")===0)state.pageReflected[current]="shown";
      else state.reflected[cbKey]="phase2";
      render();})
    .catch(function(){state.macReflections=state.macReflections||{};
      state.macReflections[cbKey]="Good. Keep going.";
      if(cbKey.indexOf("page_")===0)state.pageReflected[current]="shown";
      else state.reflected[cbKey]="phase2";
      render();});
}
function advance(){
  var p=P[current];
  if((p.kind==="prompt"||p.kind==="trade")&&p.reflect){
    if(state.reflected[p.key]!=="phase2"){
      saveStep();
      var ta=document.getElementById("ta");
      var answer=ta?ta.value:(state.answers[p.key]||"");
      if(!answer.trim()){go(nextIdx(current));return;}
      state.reflected[p.key]="loading";render();
      macReflectCall(Array.isArray(p.ask)?p.ask.join(" "):p.ask,answer,p.st||"",p.key);
      return;
    }
  }
  if((p.kind==="trades2"||p.kind==="inputs"||p.kind==="engineroom")&&!state.pageReflected[current]){
    saveStep();
    var answers=[];
    if(p.kind==="trades2"){
      p.items.forEach(function(it){var v=(state.answers[it.key]||"").trim();if(v)answers.push(it.ask+" | "+v);});
    } else if(p.kind==="inputs"){
      p.items.forEach(function(it){if(it.type==="prompt"){var v=(state.answers[it.key]||"").trim();if(v)answers.push(it.ask+" | "+v);}});
    } else if(p.kind==="engineroom"&&state.choices.engineRoom==="Open it up"){
      ["engine","governor","driver"].forEach(function(k){var v=(state.answers[k]||"").trim();if(v)answers.push(k+" | "+v);});
    }
    if(!answers.length){go(nextIdx(current));return;}
    state.pageReflected[current]="loading";render();
    macReflectCall("multiple",answers.join("\n\n"),p.st||"","page_"+current);
    return;
  }
  go(nextIdx(current));
}
function bindAll(){
  var app=document.getElementById("app"),gob=document.getElementById("go");
  if(gob)gob.addEventListener("click",function(){go(1);});
  app.querySelectorAll("[data-act]").forEach(function(b){
    b.addEventListener("click",function(){
      var a=b.getAttribute("data-act");
      if(a==="next"){saveStep();advance();}
      else if(a==="back"){saveStep();
        var p=P[current];
        if((p.kind==="prompt"||p.kind==="trade")&&p.reflect&&state.reflected[p.key]==="phase2"){
          state.reflected[p.key]="";render();return;}
        go(prevIdx(current));}
      else if(a==="submit"){saveStep();submit();}
    });
  });
  app.querySelectorAll("[data-mirror]").forEach(function(b){
    b.addEventListener("click",function(){state.mirror[P[current].n]=b.getAttribute("data-mirror");go(nextIdx(current));});
  });
  app.querySelectorAll("[data-choose]").forEach(function(b){
    b.addEventListener("click",function(){
      saveStep();state.choices[b.getAttribute("data-choose")]=b.getAttribute("data-val");render();});
  });
  app.querySelectorAll("[data-mirror2]").forEach(function(b){
    b.addEventListener("click",function(){
      saveStep();
      var n=parseInt(b.getAttribute("data-mirror2"),10);
      var val=b.getAttribute("data-val2");
      state.mirror[n]=val;
      render();
    });
  });
  app.querySelectorAll("[data-cm]").forEach(function(b){
    b.addEventListener("click",function(){saveStep();state.choices.contactMethod=b.getAttribute("data-cm");render();});
  });
  app.querySelectorAll("[data-consent]").forEach(function(el){
    el.addEventListener("click",function(){saveStep();var k=el.getAttribute("data-consent");
      state.consent[k]=!state.consent[k];render();});
  });
}

/* ================= SUBMIT ================= */
function buildPayload(){var r=readoutData();
  return{submittedAt:new Date().toISOString(),
    contact:{name:state.answers.contactName||"",method:state.choices.contactMethod||"",handle:state.answers.contactVal||""},
    consent:{sendCopy:!!state.consent.copy,brianMayRespond:!!state.consent.brian},
    scores:{wear:r.g,bands:r.bands,bindingConstraint:r.binding,systemPressure:r.red},
    wealthLens:{timeWealth:state.gauges.timeWealth||null,powerWealth:state.gauges.powerWealth||null},
    mirror:state.mirror,dayDial:{creativePeak:state.choices.peak||"",energyLow:state.choices.low||""},
    answers:state.answers};}
function submit(){
  var payload=buildPayload();
  /* DEPLOY: POSTs to the Cloudflare Pages Function at /api/true-up -- emails Brian,
     and (if consent.sendCopy) the respondent. Fails silently until the function is live. */
  try{if(window.fetch)fetch("/api/true-up",{method:"POST",
    headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}).catch(function(){});}catch(e){}
  go(P.length-1);
}

render();
</script>
